<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Kaion | Premium MTG Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #0f172a; --card-bg: #1e293b; --text: #cbd5e1; --accent: #f59e0b; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; font-family: system-ui; }
        .card-row { display: flex; width: 100%; gap: 12px; padding: 12px; background: var(--card-bg); border-radius: 12px; border: 1px solid #334155; }
        .card-details { display: flex; flex-direction: column; justify-content: space-between; flex-grow: 1; min-width: 0; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="loading-overlay" class="fixed inset-0 bg-slate-950 z-50 flex flex-col items-center justify-center p-4">
        <div class="text-white font-black text-2xl tracking-tighter uppercase mb-4">Magic Kaion</div>
        <div id="loader-status" class="text-slate-500 text-sm">Connecting to cloud...</div>
        <div class="w-16 h-1 bg-slate-800 rounded-full overflow-hidden mt-4"><div class="h-full bg-indigo-500 w-1/2 animate-pulse"></div></div>
    </div>

    <main class="px-4 py-8 max-w-2xl mx-auto">
        <h1 class="text-white text-3xl font-black mb-6">Marketplace</h1>
        <div id="store-display" class="space-y-4"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAbALzMNr_wexTTHD2f3J3HxJqhjnG8yU0",
            authDomain: "magic-kion.firebaseapp.com",
            projectId: "magic-kion",
            storageBucket: "magic-kion.firebasestorage.app",
            messagingSenderId: "928438635995",
            appId: "1:928438635995:web:ccb79329b678f299046bfe"
        };
        const appId = 'magic-kaion-app';
        
        const loaderStatus = document.getElementById('loader-status');

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            useFirebase = true;
            } catch (error) {
            console.error("Firebase init failed:", error);
            }   

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    const invRef = collection(db, 'artifacts', appId, 'public', 'data', 'inventory');
                    onSnapshot(invRef, (snapshot) => {
                        const inventory = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        renderStore(inventory);
                        document.getElementById('loading-overlay').classList.add('hidden');
                    }, (err) => {
                        console.error("Firestore Snapshot Error:", err);
                        loaderStatus.innerText = "Error syncing data. Check console.";
                    });
                } else {
                    signInAnonymously(auth).catch(e => {
                        console.error("Auth error:", e);
                        loaderStatus.innerText = "Authentication failed.";
                    });
                }
            });

            window.saveCard = async (card) => {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', card.id || crypto.randomUUID()), card);
            };

        } catch (err) {
            console.error("Firebase Init Error:", err);
            loaderStatus.innerText = "Initialization failed.";
        }

        function renderStore(inventory) {
            const container = document.getElementById('store-display');
            container.innerHTML = inventory.map(card => `
                <div class="card-row">
                    <img src="${card.img}" class="w-16 h-20 bg-slate-800 rounded" onerror="this.src='https://cards.scryfall.io/back.png'">
                    <div class="card-details">
                        <h3 class="font-bold">${card.name}</h3>
                        <p class="text-amber-500">$${card.price}</p>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
